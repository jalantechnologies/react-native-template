name: 'Deploy iOS App to App Store (Production)'
description: 'Build and deploy the iOS app to the App Store using Fastlane'

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v3

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.1

    - name: Select Xcode 16.2
      run: |
        sudo xcode-select -s /Applications/Xcode_16.2.app
        export DEVELOPER_DIR="/Applications/Xcode_16.2.app/Contents/Developer"
        xcode-select -p
        xcodebuild -version
      shell: bash

    - name: Install Bundler
      run: gem install bundler
      shell: bash

    - name: Install Ruby dependencies
      working-directory: ios
      run: bundle install
      shell: bash

    - name: Set Node Version
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc

    - name: Install Yarn
      run: npm install -g yarn
      shell: bash

    - name: Install dependencies
      run: yarn install
      shell: bash

    - name: Patch Boost Podspec with Custom Source
      working-directory: node_modules/react-native/third-party-podspecs
      run: |
        awk '
        /spec.source/ {
          print "  spec.source = { :http => '\''https://archives.boost.io/release/1.76.0/source/boost_1_76_0.tar.gz'\'', :sha256 => '\''7bd7ddceec1a1dfdcbdb3e609b60d01739c38390a5f956385a12f3122049f0ca'\'' }";
          skip=1; next
        }
        skip && /\}/ { skip=0; next }
        skip && /:sha256/ { next }
        { print }
        ' boost.podspec > boost.podspec.tmp && mv boost.podspec.tmp boost.podspec
      shell: bash

    - name: Install CocoaPods dependencies
      working-directory: ios
      run: |
        bundle exec pod install --deployment
      shell: bash

    - name: Set up SSH for Match
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ env.IOS_MATCH_DEPLOY_KEY }}

    - name: Add GitHub to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan github.com >> ~/.ssh/known_hosts
      shell: bash

    - name: Setup Keychain
      run: |
        security create-keychain -p ${{ env.IOS_KEYCHAIN_PASSWORD }} ios.keychain
        security set-keychain-settings -lut 21600 ios.keychain
        security unlock-keychain -p ${{ env.IOS_KEYCHAIN_PASSWORD }} ios.keychain
        security list-keychains -s ios.keychain
        security default-keychain -d user -s ios.keychain
      shell: bash

    - name: Export Match password
      run: echo "MATCH_PASSWORD=${{ env.MATCH_PASSWORD }}" >> $GITHUB_ENV
      shell: bash

    - name: Install code signing certificates via Match
      working-directory: ios
      run: bundle exec fastlane ci_signing_setup
      shell: bash

    - name: Clear Derived Data
      run: rm -rf ~/Library/Developer/Xcode/DerivedData
      shell: bash

    - name: Bundle React Native for iOS
      run: |
        ENVFILE=.env.production NODE_ENV=production npx react-native bundle \
          --entry-file index.js \
          --platform ios \
          --dev false \
          --bundle-output ios/main.jsbundle \
          --assets-dest .
      shell: bash

    - name: Deploy the iOS app to Production
      working-directory: ios
      run: bundle exec fastlane ios production_deploy
      shell: bash

    - name: Upload Xcode build logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: xcode-build-logs
        path: /Users/runner/Library/Logs/gym/*.log
