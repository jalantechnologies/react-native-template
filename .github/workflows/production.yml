name: cd
on:
  push:
    branches:
      - main
    paths:
      - package.json

permissions:
  contents: write

concurrency:
  group: cd-production
  cancel-in-progress: true

jobs:
  commit_message_gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Validate bump commit message
        id: gate
        env:
          HEAD_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          SUBJECT=$(printf "%s" "$HEAD_MESSAGE" | head -n 1)
          if printf "%s" "$SUBJECT" | grep -Eq '^chore: bump version to v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  release_notes_check:
    needs: [commit_message_gate]
    if: needs.commit_message_gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_notes: ${{ steps.check.outputs.release_notes }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"
          
      - name: Echo version for deploy
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## 🚀 Deployment Started" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          
      - name: Check release notes
        id: check
        uses: ./.github/actions/release_notes_check
        with:
          version_file: 'package.json'
          notes_dir: 'docs/release_notes'
          notes_ext: '.md'
          
  deploy_android:
    runs-on: ubuntu-latest
    needs: [release_notes_check]
    steps:
      - name: Checkout (app)
        uses: actions/checkout@v4
          
      - name: Inject Doppler Production Secrets
        uses: ./.github/actions/inject_doppler_secrets
        with:
          doppler_token: ${{ secrets.DOPPLER_PRODUCTION_TOKEN }}
          doppler_project: react-native-template
          doppler_environment: production
          working_directory: .
          
      - name: Deploy Android app to Play Store
        id: deploy_android_production
        uses: ./.github/actions/deploy_android_production
        with:
          ANDROID_APP_IDENTIFIER: ${{ secrets.ANDROID_APP_IDENTIFIER }}
          GPLAY_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GPLAY_SERVICE_ACCOUNT_KEY_JSON }}
          ANDROID_KEYSTORE_FILE: ${{ secrets.ANDROID_KEYSTORE_FILE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          RELEASE_NOTES: ${{ needs.release_notes_check.outputs.release_notes }}
          
      - name: Stage Android production AAB
        if: success()
        shell: bash
        run: |
          mkdir -p production-artifacts
          AAB=$(find android/app/build/outputs/bundle -name "*.aab" | head -1)
          if [ -n "$AAB" ]; then
            cp "$AAB" production-artifacts/react-native-template.aab
          fi

      - name: Upload Android production artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-production-release
          path: production-artifacts/react-native-template.aab
          if-no-files-found: warn

      - name: Android deployment summary
        if: success()
        run: |
          echo "## ✅ Android Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "Version ${{ needs.release_notes_check.outputs.version }} deployed to Play Store" >> $GITHUB_STEP_SUMMARY

      - name: Failure summary
        if: failure()
        run: |
          echo "## ❌ Android Production Deploy Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Android production build or Play Store upload failed. Review the step logs above for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY

  deploy_ios:
    runs-on: macos-15
    needs: [release_notes_check]
    timeout-minutes: 30
    steps:
      - name: Checkout (app)
        uses: actions/checkout@v4
          
      - name: Inject Doppler Production Secrets
        uses: ./.github/actions/inject_doppler_secrets
        with:
          doppler_token: ${{ secrets.DOPPLER_PRODUCTION_TOKEN }}
          doppler_project: react-native-template
          doppler_environment: production
          working_directory: . 
          
      - name: Deploy iOS app to App Store
        uses: ./.github/actions/deploy_ios_production
        with:
          RELEASE_NOTES: ${{ needs.release_notes_check.outputs.release_notes }}
          IOS_MATCH_PASSWORD: ${{ secrets.IOS_MATCH_PASSWORD }}
          IOS_MATCH_REPOSITORY_URL: ${{ secrets.IOS_MATCH_REPOSITORY_URL }}
          IOS_APPLE_ID: ${{ secrets.IOS_APPLE_ID }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          IOS_APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.IOS_APP_STORE_CONNECT_API_KEY_ID }}
          IOS_APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.IOS_APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          IOS_APP_STORE_CONNECT_API_KEY_B64: ${{ secrets.IOS_APP_STORE_CONNECT_API_KEY_B64 }}
          IOS_APP_IDENTIFIER: ${{ secrets.IOS_APP_IDENTIFIER }}
          IOS_APP_STORE_TEAM_ID: ${{ secrets.IOS_APP_STORE_TEAM_ID }}
          IOS_DEV_EMAIL: ${{ secrets.IOS_DEV_EMAIL }}
          IOS_MATCH_DEPLOY_KEY: ${{ secrets.IOS_MATCH_DEPLOY_KEY }}
          
      - name: Stage iOS production IPA
        if: success()
        shell: bash
        run: |
          mkdir -p production-artifacts
          IPA=$(find ios -maxdepth 2 -name "*.ipa" | head -1)
          if [ -n "$IPA" ]; then
            cp "$IPA" production-artifacts/react-native-template.ipa
          fi

      - name: Upload iOS production artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-production-release
          path: production-artifacts/react-native-template.ipa
          if-no-files-found: warn

      - name: iOS deployment summary
        if: success()
        run: |
          echo "## ✅ iOS Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "Version ${{ needs.release_notes_check.outputs.version }} deployed to App Store" >> $GITHUB_STEP_SUMMARY

      - name: Failure summary
        if: failure()
        run: |
          echo "## ❌ iOS Production Deploy Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "iOS production build or App Store upload failed. Review the step logs above for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY

  publish_production_release:
    runs-on: ubuntu-latest
    needs: [release_notes_check, deploy_android, deploy_ios]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: production-artifacts
          merge-multiple: true

      - name: Prepare release notes
        shell: bash
        env:
          VERSION: ${{ needs.release_notes_check.outputs.version }}
          RELEASE_NOTES: ${{ needs.release_notes_check.outputs.release_notes }}
        run: |
          {
            echo "## Release v${VERSION}"
            echo ""
            echo "- Version: ${VERSION}"
            echo "- Commit: ${GITHUB_SHA}"
            echo ""
            echo "### Release Notes"
            echo "${RELEASE_NOTES}"
          } > production-release-notes.md

      - name: Create or update production release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.release_notes_check.outputs.version }}
        run: |
          TAG="v${VERSION}"
          TITLE="Release v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file production-release-notes.md --draft=false --prerelease=false --latest
          else
            gh release create "$TAG" --title "$TITLE" --notes-file production-release-notes.md --draft=false --prerelease=false --latest
          fi
          AAB=$(find production-artifacts -name "*.aab" | head -1)
          IPA=$(find production-artifacts -name "*.ipa" | head -1)
          if [ -z "$AAB" ] && [ -z "$IPA" ]; then
            echo "::error::No production artifacts found to upload to GitHub Release"
            exit 1
          fi
          [ -n "$AAB" ] && gh release upload "$TAG" "$AAB" --clobber
          [ -n "$IPA" ] && gh release upload "$TAG" "$IPA" --clobber
